name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/nextsport.p12

      - name: Expo prebuild (generate native Android project)
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/nextsport.p12 \
            -Pandroid.injected.signing.store.password=nextsport2026 \
            -Pandroid.injected.signing.key.alias=nextsport \
            -Pandroid.injected.signing.key.password=nextsport2026 \
            -Pandroid.injected.signing.store.type=PKCS12

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextsport-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Print download info
        run: |
          echo "✅ Build complete! Download the APK from the Actions artifacts tab above."
          ls -lh android/app/build/outputs/apk/release/
