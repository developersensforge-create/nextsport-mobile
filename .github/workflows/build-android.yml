name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/nextsport.p12

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/nextsport.p12 \
            -Pandroid.injected.signing.store.password=nextsport2026 \
            -Pandroid.injected.signing.key.alias=nextsport \
            -Pandroid.injected.signing.key.password=nextsport2026 \
            -Pandroid.injected.signing.store.type=PKCS12

      - uses: actions/upload-artifact@v4
        with:
          name: nextsport-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Notify Discord (GitHub artifact link)
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_NUM=${{ github.run_number }}
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="nextsport-apk-${RUN_NUM}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | cut -c1-100)

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"📱 **NextSport Android Build #${RUN_NUM} Ready**\n\n📦 **Artifact:** ${ARTIFACT_NAME}\n🔗 **Download from run:** ${RUN_URL}\n\n🔖 Commit: \`${SHA_SHORT}\` — ${COMMIT_MSG}\n\n_Artifacts are in the run page under Artifacts._\"}"

          echo "Done! Posted run URL: $RUN_URL"
