name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/nextsport.p12

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/nextsport.p12 \
            -Pandroid.injected.signing.store.password=nextsport2026 \
            -Pandroid.injected.signing.key.alias=nextsport \
            -Pandroid.injected.signing.key.password=nextsport2026 \
            -Pandroid.injected.signing.store.type=PKCS12

      - name: Upload APK to Supabase & notify Discord
        env:
          SUPABASE_URL: https://kpahmlhkvmasyobwrewy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          APK_PATH=android/app/build/outputs/apk/release/app-release.apk
          RUN_NUM=${{ github.run_number }}
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          FILENAME="nextsport-build-${RUN_NUM}-${SHA_SHORT}.apk"

          echo "Uploading $FILENAME to Supabase..."
          curl -s -X POST \
            "${SUPABASE_URL}/storage/v1/object/apk-builds/${FILENAME}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @"${APK_PATH}"

          APK_URL="${SUPABASE_URL}/storage/v1/object/public/apk-builds/${FILENAME}"
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | cut -c1-100)

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"📱 **NextSport Android Build #${RUN_NUM} Ready**\n\n📥 **Download APK:** ${APK_URL}\n\n🔖 Commit: \`${SHA_SHORT}\` — ${COMMIT_MSG}\n\n_Uninstall the old version first, then install._\"}"

          echo "Done! APK URL: $APK_URL"

      - uses: actions/upload-artifact@v4
        with:
          name: nextsport-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
