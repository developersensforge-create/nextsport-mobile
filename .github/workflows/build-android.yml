name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/nextsport.p12

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build release APK and AAB
        working-directory: android
        run: |
          ./gradlew assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/nextsport.p12 \
            -Pandroid.injected.signing.store.password=nextsport2026 \
            -Pandroid.injected.signing.key.alias=nextsport \
            -Pandroid.injected.signing.key.password=nextsport2026 \
            -Pandroid.injected.signing.store.type=PKCS12

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK to Supabase (public direct download)
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          RUN_NUM=${{ github.run_number }}
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          SUPABASE_URL="https://kpahmlhkvmasyobwrewy.supabase.co"

          # Upload APK to Supabase
          curl -s -X POST "${SUPABASE_URL}/storage/v1/object/apk-builds/nextsport-build${RUN_NUM}.apk" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary @${APK_PATH}

          # Upload AAB to Supabase (for Google Play)
          AAB_PATH="android/app/build/outputs/bundle/release/app-release.aab"
          curl -s -X POST "${SUPABASE_URL}/storage/v1/object/apk-builds/nextsport-build${RUN_NUM}.aab" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @${AAB_PATH}

          # Public URL with ?download= forces Content-Disposition: attachment on Android Chrome
          PUBLIC_URL="${SUPABASE_URL}/storage/v1/object/public/apk-builds/nextsport-build${RUN_NUM}.apk?download=nextsport.apk"
          echo "SUPABASE_APK_URL=${PUBLIC_URL}" >> $GITHUB_ENV

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RUN_NUM=${{ github.run_number }}
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | cut -c1-100)
          APK_URL="${SUPABASE_APK_URL}"

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"📱 **NextSport Build #${RUN_NUM} Ready**\n\n📥 **APK:** ${APK_URL}\n\n🔖 \`${SHA_SHORT}\` — ${COMMIT_MSG}\"}" || true
